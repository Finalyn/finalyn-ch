<!DOCTYPE html>
<html lang="fr-CH">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studio Finalyn · Bientôt disponible</title>
<meta name="description" content="Le site du studio Finalyn arrive bientôt. Studio suisse d'innovation et de commercialisation, basé à Rolle." />
<meta name="robots" content="noindex, follow" />
<link rel="canonical" href="https://finalyn.ch/studio/" />
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
<meta name="theme-color" content="#0EA5E9" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{--bg:#f8fafc;--ink:#0f172a;--muted:#475569;--line:#e2e8f0;--brand:#0284c7;}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg)}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.6}
.cs{position:relative;min-height:100svh;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.cs__img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:right center;z-index:0}
.cs__veil{position:absolute;inset:0;z-index:1;background:radial-gradient(ellipse 78% 82% at 50% 50%,rgba(248,250,252,.88) 0%,rgba(248,250,252,.62) 58%,rgba(248,250,252,.42) 100%)}
.cs__inner{position:relative;z-index:2;padding:40px clamp(20px,5vw,56px);max-width:640px}
.cs__logo{height:clamp(2.9rem,5.8vw,4.4rem);width:auto;margin:0 auto 24px;display:block}
.badge{display:inline-block;font-size:.78rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--brand);background:rgba(2,132,199,.1);border:1px solid rgba(2,132,199,.2);padding:6px 14px;border-radius:999px;margin-bottom:22px}
.cs__text{font-size:1.1rem;color:var(--muted);margin:0 auto 30px;max-width:42ch}
.cs__cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:.95rem;padding:13px 26px;border-radius:999px;border:1px solid transparent;text-decoration:none;color:inherit;transition:transform .25s,background .25s,border-color .25s}
.btn-primary{background:var(--ink);color:#fff}.btn-primary:hover{background:var(--brand);transform:translateY(-2px)}
.btn-soft{background:#fff;color:var(--ink);border-color:var(--line)}.btn-soft:hover{border-color:var(--brand);transform:translateY(-2px)}
</style>
</head>
<body>
<section class="cs">
  <img class="cs__img" src="/assets/hero-finalyn.webp" alt="" fetchpriority="high" />
  <div class="cs__veil" aria-hidden="true"></div>
  <div class="cs__inner">
    <img class="cs__logo" src="/assets/logo-finalyn.svg" alt="Finalyn" />
    <span class="badge">Bientôt disponible</span>
    <p class="cs__text">Le site du studio Finalyn arrive très bientôt. Studio suisse d'innovation et de commercialisation.</p>
    <div class="cs__cta">
      <a href="/" class="btn btn-primary">Retour à Finalyn</a>
      <a href="mailto:contact@finalyn.ch?subject=Contact%20Finalyn" class="btn btn-soft">Nous contacter</a>
    </div>
  </div>
</section>
</body>
</html>
